name: Update data

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: 0 12 * * * # 7:00 PM in Vietnam

jobs:
  update-data:
    if: github.repository_owner == 'eddyduong3010'
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repo content
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --no-dev --no-install-project

      - name: Fetch data
        run: uv run src/fetch.py

      - name: Fetch recent XSMN results
        continue-on-error: true
        run: uv run src/fetch_xsmn.py --days 60 --workers 12

      - name: Fetch recent Power 6/55 results
        continue-on-error: true
        run: uv run src/fetch_vietlott_power655.py --limit 20 --skip-details

      - name: Save and evaluate predictions
        run: uv run src/update_prediction_history.py

      - name: Analyze data
        run: uv run src/analyze.py

      - name: Commit changes
        run: |
          git add data/*.csv data/*.json data/*.parquet
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git commit -m "Update lottery data and prediction history $(date +'%Y-%m-%d')"
          git push origin main
